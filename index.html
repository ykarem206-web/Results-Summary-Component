<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="style.css" rel="stylesheet">
  
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <div class="container">
    <div class="rslt">
      <p class="head">Your Result</p>
      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h1 class="great">Great</h1>
      <p class="par">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    
    <div class="summary">
      <p class="head1">Summary</p>

      <div class="item reaction"> 
        <div class="category">
          <span class="icon"><img src="assets/images/icon-reaction.svg"></span>
          <span class="reaction-name">Reaction</span>
        </div>
        <div class="score">
          <span class="user-score">80</span>
          <span class="total-score"> / 100</span>
        </div>
      </div>
      <div class="item memory"> 
        <div class="category">
          <span class="icon"><img src="assets/images/icon-memory.svg"></span>
          <span class="memory-name">Memory</span>
        </div>
        <div class="score">
          <span class="user-score">92</span>
          <span class="total-score"> / 100</span>
        </div>
      </div>
      <div class="item verbal"> 
        <div class="category">
          <span class="icon"><img src="assets/images/icon-verbal.svg"></span>
          <span class="verbal-name">Verbal</span>
        </div>
        <div class="score">
          <span class="user-score">61</span>
          <span class="total-score"> / 100</span>
        </div>
      </div>
      <div class="item visual"> 
        <div class="category">
          <span class="icon"><img src="assets/images/icon-visual.svg"></span>
          <span class="visual-name">Visual</span>
        </div>
        <div class="score">
          <span class="user-score">72</span>
          <span class="total-score"> / 100</span>
        </div>
      </div>

      <button type="submit">Continue</button>
    </div>
  
  </div>
</body>
</html>
